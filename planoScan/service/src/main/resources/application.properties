server.port=8082
spring.application.name=planoscan
spring.config.import=optional:application-local.properties
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=planoscan-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

app.admin.email=admin@planoscan.com
app.admin.password=Admin@123
app.admin.name=Admin

gemini.api.key=
gemini.model=gemini-flash-latest
scoring.flag-threshold=90
scoring.max-attempts=3

logging.level.com.example.demo.ai.GeminiAiClient=DEBUG

app.frontend-url=${FRONTEND_URL:http://localhost:5173}

sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:planoscan.notify@gmail.com}
sendgrid.from-name=${SENDGRID_FROM_NAME:PlanoScan}
